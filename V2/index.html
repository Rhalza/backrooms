<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1608">
  <meta name="description" content="A browser-based Backrooms Level 0 exploration simulator. Endless yellow rooms.">
  <title>BACKROOMS — Level 0</title>
  <link rel="stylesheet" href="./css/style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="game-container">
    <canvas id="canvas"></canvas>

    <!-- HUD overlay -->
    <div id="hud" class="hidden">
      <div id="crosshair"></div>
      <div id="stats">
        <div id="fps">FPS --</div>
        <div id="coords">X 0 / Z 0</div>
        <div id="chunk-info">chunk 0,0</div>
      </div>
      <button id="btn-pause" class="hud-btn">MENU</button>
      <div id="quality-badge">MEDIUM</div>
      <div id="toast" class="hidden"></div>
    </div>

    <!-- Mobile controls -->
    <div id="mobile-controls" class="hidden">
      <div id="move-joystick">
        <div id="joystick-base">
          <div id="joystick-knob"></div>
        </div>
      </div>
      <div id="look-area"></div>
      <div id="action-buttons">
        <button id="btn-sprint" class="action-btn">RUN</button>
        <button id="btn-crouch" class="action-btn">DUCK</button>
      </div>
    </div>

    <!-- Start menu -->
    <div id="menu" class="overlay">
      <div class="menu-panel">
        <h1 class="menu-title">BACKROOMS</h1>
        <p class="menu-subtitle">Level 0</p>
        <p class="menu-warning">You have no-clipped out of reality.</p>
        <button id="btn-start" class="menu-btn primary">ENTER</button>
        <button id="btn-settings" class="menu-btn">SETTINGS</button>
        <p class="menu-hint" id="menu-hint">Desktop: click to lock mouse, WASD to move, Shift to run, Ctrl to crouch.<br>Mobile: left stick to move, right side to look.</p>
      </div>
    </div>

    <!-- Settings panel -->
    <div id="settings" class="overlay hidden">
      <div class="menu-panel">
        <h2 class="menu-title small">SETTINGS</h2>
        <label class="setting-row">
          <span>Quality</span>
          <select id="set-quality">
            <option value="low">Low (slow devices)</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </label>
        <label class="setting-row">
          <span>Render Distance</span>
          <input type="range" id="set-render-distance" min="2" max="10" step="1" value="4">
          <span id="rd-val" class="val">4</span>
        </label>
        <label class="setting-row">
          <span>Pixel Ratio Cap</span>
          <input type="range" id="set-pixel-ratio" min="0.5" max="2" step="0.1" value="1">
          <span id="pr-val" class="val">1.0</span>
        </label>
        <label class="setting-row">
          <span>Mouse / Touch Sensitivity</span>
          <input type="range" id="set-sensitivity" min="0.1" max="2" step="0.05" value="0.5">
          <span id="sn-val" class="val">0.50</span>
        </label>
        <label class="setting-row">
          <span>Field of View</span>
          <input type="range" id="set-fov" min="60" max="100" step="1" value="75">
          <span id="fov-val" class="val">75</span>
        </label>
        <div class="setting-row">
          <span>Toggles</span>
          <div class="toggle-group">
            <label><input type="checkbox" id="set-fog" checked> Fog</label>
            <label><input type="checkbox" id="set-bob" checked> Head Bob</label>
            <label><input type="checkbox" id="set-textures" checked> Textures</label>
            <label><input type="checkbox" id="set-stains" checked> Stains</label>
          </div>
        </div>
        <button id="btn-back" class="menu-btn">BACK</button>
      </div>
    </div>
  </div>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
